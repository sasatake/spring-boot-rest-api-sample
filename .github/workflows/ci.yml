name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: library_test
          POSTGRES_USER: library
          POSTGRES_PASSWORD: library
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U library"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'
      - name: Run tests
        run: ./gradlew test
      - name: Run static analysis
        run: ./gradlew checkstyleMain checkstyleTest pmdMain pmdTest
      - name: Add coverage report to PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          title: Coverage
      - name: Write static analysis summary
        if: always()
        run: |
          {
            echo "## Static Analysis (warnings only)"
            for f in build/reports/checkstyle/*.xml; do
              [ -f "$f" ] || continue
              count=$(grep -c '<error' "$f" || true)
              echo "- Checkstyle $(basename "$f" .xml): ${count} warnings"
            done
            for f in build/reports/pmd/*.xml; do
              [ -f "$f" ] || continue
              count=$(grep -c '<violation' "$f" || true)
              echo "- PMD $(basename "$f" .xml): ${count} violations"
            done
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload analysis reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: build/reports
      - name: Publish test summary
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/build/test-results/test/TEST-*.xml'
          check_name: 'Test Results'
      - name: Comment test results on PR
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/build/test-results/test/TEST-*.xml'
